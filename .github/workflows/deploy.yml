name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build pro nasazení
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Nastavení Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Nastavení GitHub Pages
        uses: actions/configure-pages@v5

      - name: Instalace závislostí
        run: npm install

      - name: Validace obsahu
        run: npm run content:validate

      - name: Build obsahu
        run: npm run content:build

      - name: Build aplikace
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Nahrání artefaktu
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Nasazení na GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Nasazení
        id: deployment
        uses: actions/deploy-pages@v4
